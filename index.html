<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>叮卡</title>
    <script>
      // Apply the saved (or OS-preferred) theme before first paint, so the app
      // never flashes the wrong background before the external CSS loads. Must
      // stay in sync with useAppTheme.ts (key + logic).
      (function () {
        var mode = 'light'
        try {
          var saved = localStorage.getItem('slicer.mode.v1')
          mode =
            saved === 'light' || saved === 'dark'
              ? saved
              : window.matchMedia &&
                window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'dark'
              : 'light'
        } catch (e) {}
        var root = document.documentElement
        root.setAttribute('data-theme', mode)
        // Match the UA canvas / scrollbars to the theme so they don't flash on
        // load or when toggling.
        root.style.colorScheme = mode
      })()
    </script>
    <!-- Critical first-paint background. Inlined so the correct color is up
         before the external stylesheet (loaded via the JS module) arrives,
         which is what caused the light-mode flash-to-black on reload. Keep the
         values in sync with :root in styles.css. -->
    <style>
      html { background: #f4f4f5; }
      html[data-theme='dark'] { background: #0b0b0d; }
      html { transition: background 0.3s ease; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&family=LXGW+WenKai+TC:wght@400;700&family=ZCOOL+XiaoWei&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
