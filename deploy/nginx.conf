# 叮卡前端站点 —— 同源出前端 + 反代 /api + 直出 /uploads。
#
# 这份配置进前端镜像的 /etc/nginx/conf.d/default.conf。它只管容器内部的
# HTTP(80);TLS/HTTPS 由宿主机上更外层的反代(或云负载均衡)终结,见部署文档。

server {
  listen 80;
  server_name _;

  # 上传体积上限,与后端 config.js 的 maxUploadBytes(默认 6MB)保持一致,
  # 否则大图会在 Nginx 这层就被 413 挡掉。
  client_max_body_size 6m;

  # ---- 前端静态页 ----------------------------------------------------------
  root /usr/share/nginx/html;
  index index.html;

  # 带 hash 的构建产物可长期强缓存。
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA 回退:未命中的路径都交给 index.html,由前端路由处理。
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ---- 图片:Nginx 直出(不经后端 Node)-----------------------------------
  # uploads 卷同时挂给后端(写)和本容器(只读),见 docker-compose.yml。
  location /uploads/ {
    alias /uploads/;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # ---- API:反代到后端容器 -------------------------------------------------
  # server 是 compose 里后端服务名。默认 nginx 会在「启动时」解析 proxy_pass 里的
  # 主机名,后端还没起就会 [emerg] host not found 直接崩。改用 Docker 内置 DNS
  # (127.0.0.11)作 resolver + 变量化 upstream,把解析推迟到「请求时」——这样后端
  # 暂时不可用(启动慢、重启中)也不会拖垮 nginx,前端页面照常出,只有 /api 请求
  # 本身返回 502。
  location /api/ {
    resolver 127.0.0.11 valid=30s;
    set $upstream http://server:3000;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
