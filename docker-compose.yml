services:
  app:
    image: ghcr.io/lottshin/dingcard:${DINGCARD_VERSION:-0.11.0}
    build:
      context: .
      args:
        VITE_API_BASE: /
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-300}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-20}
      USER_QUOTA_BYTES: ${USER_QUOTA_BYTES:-524288000}
      IMAGE_LEASE_MS: ${IMAGE_LEASE_MS:-86400000}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-6291456}
      NODE_ENV: production
      DINGCARD_IMAGE: "1"
      HOST: 0.0.0.0
      PORT: "3000"
      DATA_DIR: /data
      WEB_ROOT: /app/dist
    volumes:
      - db:/data
      - uploads:/data/uploads
    ports:
      - "${WEB_PORT:-8080}:3000"

volumes:
  db:
  uploads:
