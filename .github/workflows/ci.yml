name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
      - run: npm ci
      - run: npm --prefix server ci
      - run: npm run test:unit
      - run: npm run test:server
      - run: node server/smoke-test.mjs
      - run: node --test scripts/release-readiness.test.mjs
      - run: npm run build
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - run: python -m pip install --disable-pip-version-check --no-input PyYAML==6.0.3
      - run: python -c "import pathlib, yaml; workflows=list(pathlib.Path('.github/workflows').glob('*.yml')); assert any(path.name == 'publish-image.yml' for path in workflows); [yaml.safe_load(path.read_text(encoding='utf-8')) for path in workflows]"

  browser:
    needs: static
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
      - run: npm ci
      - run: npm --prefix server ci
      - run: npx playwright install --with-deps chrome
      - run: npm run test:e2e
      - name: Upload Playwright results
        if: ${{ failure() && hashFiles('test-results/**/*') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7
